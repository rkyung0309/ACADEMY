<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>승인 대기 - SHORTHAND PRO</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="assets/css/auth.css">
  <link rel="stylesheet" href="assets/css/mobile-responsive.css?v=20260601-mobile-v1">
</head>
<body>
<div class="auth-shell"><div class="auth-card">
  <div class="auth-logo">SORIZAVA ACADEMY</div>
  <h1 class="auth-title">승인 대기 중입니다</h1>
  <div class="notice-box">회원가입은 완료되었습니다. 운영팀 승인 후 연습 페이지 접속이 가능합니다.</div>
  <p class="auth-sub" id="profileInfo">계정 상태를 확인하는 중입니다.</p>
  <div class="auth-actions">
    <button class="btn-sub" onclick="checkStatus()">상태 새로고침</button>
    <button class="btn-sub" onclick="window.SorizavaAuth.signOut()">로그아웃</button>
  </div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/auth.js"></script>
<script>
async function checkStatus(){
  const info=document.getElementById('profileInfo');
  try{
    const session=await window.SorizavaAuth.getSession();
    if(!session){location.href='index.html';return;}
    const profile=await window.SorizavaAuth.getProfile(session.user.id);
    window.SorizavaAuth.cacheProfile(session.user, profile);
    info.innerHTML=`현재 상태: <b>${profile.status}</b><br>이메일: ${session.user.email}`;
    if(profile.status==='approved') location.href='index.html';
  }catch(e){info.textContent='상태 확인에 실패했습니다.';}
}
checkStatus();
</script>
</body></html>
